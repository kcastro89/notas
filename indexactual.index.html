<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta de Calificaciones Bimestrales</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --canvas: #FBFBF7; --canvas2: #EBF2EE; --sage: #5A8F76; --sage-dark: #2C5E47;
  --text: #1E2E26; --text-muted: #586E64; --white: #FFFFFF; --border-dark: #8FA89B;
  --pass: #2E7D52; --fail: #A64444; --radius: 6px;
}
body{ background: var(--canvas); font-family: 'Lato', sans-serif; color: var(--text); min-height: 100vh; padding-bottom: 60px; }
.site-header{ background: linear-gradient(135deg, var(--sage-dark) 0%, var(--sage) 60%, #7AA892 100%); padding: 35px 20px; text-align: center; color:#fff; border-bottom: 4px double #A3C6B6; }
.instituto-name{ font-family: 'Playfair Display', serif; font-size: 24px; }
main{ max-width: 600px; margin: 30px auto; padding: 0 20px; }
.card{ background: var(--white); border: 1px solid var(--border-dark); border-radius: var(--radius); padding: 24px; box-shadow: 0 4px 16px rgba(44,94,71,.05); margin-bottom: 20px; position: relative; }
.card::after{ content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--sage); border-radius: var(--radius) var(--radius) 0 0; }
.card-title{ font-family: 'Playfair Display', serif; font-size: 18px; color: var(--sage-dark); margin-bottom: 12px; }
.field{ display:flex; flex-direction:column; gap:6px; margin-bottom: 15px; }
.field label{ font-size:11px; font-weight:700; text-transform:uppercase; color:var(--text-muted); }
input{ background: var(--canvas); border: 1px solid var(--border-dark); border-radius: 4px; padding: 12px; color: var(--text); font-size: 15px; outline: none; width: 100%; }
.btn{ width: 100%; padding: 12px; background: var(--sage-dark); color: #fff; border: none; border-radius: 4px; font-weight: 700; text-transform: uppercase; cursor: pointer; font-size: 13px; }
.btn-danger{ background: #A64444; margin-top: 10px; }
.stu-hero{ display: flex; align-items: center; gap: 14px; background: #EFF6F3; padding: 15px; border-radius: 6px; border: 1px dashed var(--border-dark); margin-bottom: 20px; }
.stu-docente-info{ background: #FFF; border: 1px solid var(--border-dark); padding: 12px; border-radius: 6px; font-size: 13px; margin-bottom: 20px; line-height: 1.4; }
.parcial-result{ background: #FFF; border: 1px solid var(--border-dark); border-radius: 6px; padding: 16px; margin-bottom: 14px; }
.pr-header{ display: flex; justify-content: space-between; font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; margin-bottom: 10px; }
.pr-break{ display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; text-align: center; }
.pr-box{ background: var(--canvas2); padding: 8px; border-radius: 4px; font-size: 12px; }
.pr-box-lbl{ font-size: 9px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; }
.pr-box-val{ font-size: 16px; font-weight: 700; margin-top: 2px; }
.badge{ font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 3px; display: inline-block; }
.badge-pass{ background: #E2F0E7; color: var(--pass); border: 1px solid var(--pass); }
.badge-fail{ background: #FCEAEA; color: var(--fail); border: 1px solid var(--fail); }
.hidden{ display:none !important; }
.c-pass{ color: var(--pass); } .c-fail{ color: var(--fail); }
</style>
</head>
<body>

<header class="site-header">
  <div style="font-size: 11px; letter-spacing: .2em; text-transform: uppercase; opacity: 0.8;">República de Honduras</div>
  <div class="instituto-name">Instituto Polivalente San Pedro de Tutule</div>
</header>

<main>
  <!-- Buscador -->
  <div id="box-busqueda" class="card">
    <div class="card-title">🔍 Consulta de Calificaciones</div>
    <div class="field">
      <label>Número de Identidad Nacional (13 dígitos)</label>
      <input type="text" id="txt-identidad" placeholder="Ej: 0703200500142" maxlength="13">
    </div>
    <button class="btn" onclick="consultarNotas()">Ver Mis Notas</button>
    <p id="error-msg" style="color:var(--fail); font-size:13px; margin-top:10px; font-weight:700;" class="hidden"></p>
  </div>

  <!-- Perfil Alumno -->
  <div id="box-resultado" class="hidden">
    <div class="stu-hero">
      <div style="font-size: 32px;">🎒</div>
      <div>
        <h3 id="lbl-nombre" style="font-family:'Playfair Display', serif; color:var(--sage-dark);">—</h3>
        <p style="font-size:12px; color:var(--text-muted);">Identidad: <span id="lbl-id">—</span></p>
      </div>
    </div>

    <div class="stu-docente-info">
      <small style="color:var(--sage); font-weight:700; text-transform:uppercase;">Docente a Cargo</small><br>
      <b>Prof. Edwin René Pinto Castro</b>
    </div>

    <div id="contenedor-materias"></div>

    <button class="btn btn-danger" onclick="cerrarSesión()">🚪 Salir de la Consulta</button>
  </div>
</main>

<script>
let ALUMNOS_DATA = {};

// Carga automática del archivo JSON correcto
window.onload = function() {
  fetch('notas_alumnos.json')
    .then(response => {
      if(!response.ok) throw new Error();
      return response.json();
    })
    .then(data => { ALUMNOS_DATA = data; })
    .catch(err => { 
      console.log("Falta subir el archivo notas_alumnos.json correcto."); 
    });
};

function consultarNotas() {
  const id = document.getElementById('txt-identidad').value.trim();
  const error = document.getElementById('error-msg');
  error.classList.add('hidden');

  if(Object.keys(ALUMNOS_DATA).length === 0) {
    error.textContent = "El sistema se está actualizando en internet o falta el archivo de notas. Intenta de nuevo en unos minutos.";
    error.classList.remove('hidden'); return;
  }

  if(id.length !== 13 || isNaN(id)) {
    error.textContent = "Por favor ingrese una identidad válida de 13 dígitos.";
    error.classList.remove('hidden'); return;
  }

  const alu = ALUMNOS_DATA[id];
  if(!alu) {
    error.textContent = "No se encontraron registros para este número de identidad.";
    error.classList.remove('hidden'); return;
  }

  document.getElementById('box-busqueda').classList.add('hidden');
  document.getElementById('box-resultado').classList.remove('hidden');
  document.getElementById('lbl-nombre').textContent = alu.nombre;
  document.getElementById('lbl-id').textContent = id;

  const cont = document.getElementById('contenedor-materias');
  cont.innerHTML = '';

  Object.keys(alu.asignaturas).forEach(materia => {
    const asig = alu.asignaturas[materia];
    let matBox = document.createElement('div');
    matBox.style.clear = 'both';
    matBox.style.marginBottom = '20px';
    matBox.innerHTML = `<h4 style="font-family:'Playfair Display', serif; color:var(--sage-dark); margin-bottom:8px; border-bottom:1px solid var(--border-dark); padding-bottom:4px;">📚 ${materia}</h4>`;

    ['I','II','III','IV'].forEach(p => {
      const nota = asig[p];
      if(nota && nota.cursado) {
        matBox.innerHTML += `
          <div class="parcial-result">
            <div class="pr-header"><div>${p} Parcial</div><div class="${nota.total>=70?'c-pass':'c-fail'}">${nota.total}</div></div>
            <div class="pr-break">
              <div class="pr-box"><div class="pr-box-lbl">Acum (50%)</div><div class="pr-box-val">${nota.acum}</div></div>
              <div class="pr-box"><div class="pr-box-lbl">Examen (50%)</div><div class="pr-box-val">${nota.examen}</div></div>
              <div class="pr-box"><div class="pr-box-lbl">Estado</div><div style="margin-top:2px;"><span class="badge ${nota.total>=70?'badge-pass':'badge-fail'}">${nota.total>=70?'APR':'REP'}</span></div></div>
            </div>
          </div>`;
      }
    });
    cont.appendChild(matBox);
  });
}

function cerrarSesión() {
  document.getElementById('box-resultado').classList.add('hidden');
  document.getElementById('box-busqueda').classList.remove('hidden');
  document.getElementById('txt-identidad').value = '';
}
</script>
</body>
</html>
